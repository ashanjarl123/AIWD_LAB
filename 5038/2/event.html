<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Formula 1 - Event Registration</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <h1>🏁 FORMULA 1 EVENT REGISTRATION</h1>
    <p>"Experience the Speed, Feel the Rush"</p>
</header>

<div class="banner">
    <svg width="100%" height="300" style="background:linear-gradient(135deg,#dc0000,#ffd700);">
        <text x="50%" y="40%" text-anchor="middle" dy=".3em" font-size="48" font-weight="bold" fill="white" font-family="Arial">FORMULA 1</text>
        <text x="50%" y="55%" text-anchor="middle" dy=".3em" font-size="24" fill="white" font-family="Arial">Grand Prix 2026</text>
        <polygon points="20,80 80,80 50,20" fill="none" stroke="white" stroke-width="3"/>
        <circle cx="80%" cy="30%" r="40" fill="none" stroke="white" stroke-width="3"/>
    </svg>
</div>

<main>
    <section>
        <h2>Event Highlights</h2>

        <h3>Race Day Excitement</h3>
        <div class="media-box">
            <!-- Put your own video file here -->
            <video controls>
                <source src="highlights.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>

        <h3>Race Ambiance</h3>
        <div class="media-box">
            <!-- Put your own audio file here -->
            <audio controls>
                <source src="anthem.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
            <small style="color:#999;display:block;margin-top:8px;">Experience the sounds of Formula 1</small>
        </div>
    </section>

    <section style="margin-top:40px;">
        <h2>Spectator Registration</h2>
        <form>
            <div class="form-group">
                <label for="name">Full Name *</label>
                <input type="text" id="name" name="name" required>
            </div>

            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-row">
                <div>
                    <label for="dob">Date of Birth *</label>
                    <input type="date" id="dob" name="dob" required>
                </div>
                <div>
                    <label for="ticket">Ticket Type *</label>
                    <select id="ticket" name="ticket" required>
                        <option value="">Select Ticket</option>
                        <option value="general">General Admission</option>
                        <option value="vip">VIP Stand</option>
                        <option value="premium">Premium Hospitality</option>
                        <option value="pit">Pit Lane Access</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Favorite Team *</label>
                <div class="radio-group">
                    <label><input type="radio" name="team" value="ferrari" required> Ferrari</label>
                    <label><input type="radio" name="team" value="mercedes"> Mercedes</label>
                    <label><input type="radio" name="team" value="mclaren"> McLaren</label>
                    <label><input type="radio" name="team" value="other"> Other</label>
                </div>
            </div>

            <div class="form-group">
                <label for="comments">Special Requests</label>
                <textarea id="comments" name="comments" placeholder="Any special accommodations or preferences..."></textarea>
            </div>

            <div class="form-group">
                <label for="file">Upload ID</label>
                <input type="file" id="file" name="file" accept=".pdf,.jpg,.png">
            </div>

            <button type="submit" class="btn">Register for Event</button>
        </form>
    </section>
</main>

<footer>&copy; 2024 Formula 1 Event Registration Portal - Experiment 2: CSS3 & Flexbox</footer>

</body>
</html>
